    <div class="overlay"></div>
    <h1>Reserva - Hotel Brilhante</h1>

    <!--PREENCHIMENTO DE DADOS-->
    <section class="dados">
        <h2>Preenchimento de dados</h2>
        <form>
            <div class="name-edit">
                <label for="name"><strong>Nome completo</strong><strong
                        style="color: red; display: inline-block;">*</strong>
                </label><br>

                <input type="text" id="name" name="nome" required>
            </div>

            <div>
                <label for="mail"><strong>E-mail</strong><strong style="color: red;">*</strong></label><br>

                <input type="email" id="mail" name="e-mail" required>
            </div>

            <div>
                <label for="nasc"><strong>Nascimento</strong><strong style="color: red;">*</strong></label><br>

                <input type="date" id="nasc" name="nascimento" required>
            </div>

            <div>
                <label for="sex"><strong>Sexo</strong><strong style="color: red;">*</strong></label><br>

                <select id="sex" name="sexo">
                    <option>Masculino</option>
                    <option>Feminino</option>
                </select>
            </div>

            <div>
                <label for="country"><strong>País de origem</strong><strong style="color: red;">*</strong></label><br>
                <input id="country" list="countries" placeholder="País" required>
                <datalist id="countries"></datalist>

            </div>
        </form>
    </section>

    <script src="../js/index.js"></script>
