    <h1>Reserva</h1>
    <hr>
    <h2>Prenchimento de dados</h2>
    <!--RESERVA POR FORMULÁRIO-->
    <form>
        <label for="name">Nome* </label><br>
        <input id="name" type="text" placeholder="Nome" required><br><br>

        <label for="surname">Sobrenome* </label><br>
        <input id="surname" type="text" placeholder="Sobrenome" required><br><br>

        <label for="mail">Email*</label><br>
        <input id="mail" type="email" placeholder="E-mail" required><br><br>

        <label for="verificmail">Confirmar e-mail*</label><br>
        <input id="verificmail" type="email" placeholder="Confirmar e-mail" required><br><br>

        <label for="cell">Telefone*</label><br>
        <input id="cell" type="tel" placeholder="Número" required><br><br>

        <label for="cheackin">Check-in*</label><br>
        <input id="checkin" type="date" required><br><br>

        <label for="cheackout">Check-out*</label><br>
        <input id="checkout" type="date" required><br><br>

        <label for="country">País*</label><br>
        <input id="country" type="text" placeholder="País" required><br><br>

        <label for="state">Estado*</label><br>
        <input id="state" type="text" placeholder="Estado" required><br><br>

        <label for="city">Cidade*</label><br>
        <input id="city" type="text" placeholder="Cidade" required><br><br>

        <label for="cep">Cep*</label><br>
        <input id="cep" type="tel" placeholder="Código postal" required><br><br>

        <label for="adult">Adultos*</label><br>
        <input id="adult" type="number" value="0" required><br><br>

        <label for="kid">Crianças de 0 a 16 anos*</label><br>
        <input id="kid" type="number" value="0" required><br><br>


        <input type="submit" value="Finalizar Reserva">

    </form>
